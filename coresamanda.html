<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cores — Teacher Amanda</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500;1,9..144,700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; }
  body { font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; height: 100vh; }

  .swatches { display: flex; flex: 1; min-height: 0; }
  .swatch { display: flex; flex-direction: column; justify-content: flex-end; padding: 28px; position: relative; overflow: hidden; transition: background 0.2s; }
  .s1 { flex: 4; }
  .s2 { flex: 2; }
  .s3 { flex: 1.5; }
  .s4 { flex: 0.8; }

  .swatch-name { font-family: 'Fraunces', serif; font-style: italic; font-size: 28px; font-weight: 500; margin-bottom: 6px; }
  .swatch-hex  { font-family: 'DM Sans', sans-serif; font-size: 13px; opacity: 0.65; }

  .warning-tag  { position: absolute; top: 16px; left: 16px; font-size: 9px; font-weight: 500; color: rgba(255,255,255,0.55); background: rgba(0,0,0,0.35); padding: 3px 8px; border-radius: 2px; }
  .warning-text { position: absolute; top: 44px; left: 16px; right: 16px; font-size: 10px; color: rgba(255,255,255,0.45); line-height: 1.5; }

  /* NAV */
  .nav { height: 100px; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; flex-shrink: 0; gap: 24px; transition: background 0.2s; }

  .nav-left { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; width: 200px; }
  .nav-step-label { font-size: 9px; font-weight: 500; text-transform: uppercase; color: #EDE8DF; opacity: 0.4; }
  .nav-direction { font-family: 'Fraunces', serif; font-style: italic; font-size: 14px; color: #EDE8DF; opacity: 0.85; }

  .slider-wrap { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .slider-track { position: relative; height: 32px; display: flex; align-items: center; }
  .slider-bg { position: absolute; left: 0; right: 0; height: 6px; border-radius: 3px; }
  .slider-input {
    position: relative; width: 100%; height: 32px;
    -webkit-appearance: none; appearance: none;
    background: transparent; cursor: pointer; z-index: 2;
  }
  .slider-input::-webkit-slider-thumb {
    -webkit-appearance: none; width: 24px; height: 24px;
    border-radius: 50%; background: #EDE8DF;
    border: 2px solid rgba(255,255,255,0.4);
    cursor: grab; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .slider-input::-moz-range-thumb {
    width: 24px; height: 24px; border-radius: 50%;
    background: #EDE8DF; border: 2px solid rgba(255,255,255,0.4);
    cursor: grab;
  }
  .slider-labels { display: flex; justify-content: space-between; }
  .slider-label { font-size: 9px; color: rgba(237,232,223,0.4); }

  .nav-buttons { display: flex; gap: 8px; flex-shrink: 0; }
  .nav-btn {
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    padding: 10px 20px; border-radius: 4px; min-width: 48px;
    border: 1px solid rgba(255,255,255,0.15); background: transparent;
    color: #EDE8DF; cursor: pointer; transition: background 0.15s, border-color 0.15s;
  }
  .nav-btn.active { border-color: rgba(237,232,223,0.6); background: rgba(255,255,255,0.08); }

  @media (max-width: 600px) {
    .swatches { flex-direction: column; }
    .s1 { flex: 4; }
    .s2 { flex: 2; }
    .s3 { flex: 1.5; }
    .s4 { flex: 2; justify-content: flex-start; overflow: visible; padding-top: 16px; }
    .s4 .warning-tag { position: relative; top: auto; left: auto; display: inline-block; margin-bottom: 6px; }
    .s4 .warning-text { position: relative; top: auto; left: auto; right: auto; margin-bottom: 10px; }
    .s4 .swatch-name { margin-top: auto; }
    .swatch { padding: 16px 20px; }
    .swatch-name { font-size: 20px; }
    .swatch-hex  { font-size: 11px; }
    .nav { height: auto; flex-direction: column; align-items: stretch; padding: 16px 20px; gap: 14px; }
    .nav-left { width: 100%; }
    .nav-buttons { gap: 8px; }
    .nav-btn { flex: 1; padding: 14px 0; font-size: 15px; text-align: center; min-width: 0; border-radius: 6px; }
  }
</style>
</head>
<body>

<div class="swatches">
  <div class="swatch s1" id="s1">
    <span class="swatch-name" id="s1-name"></span>
    <span class="swatch-hex"  id="s1-hex"></span>
  </div>
  <div class="swatch s2" id="s2">
    <span class="swatch-name" id="s2-name"></span>
    <span class="swatch-hex"  id="s2-hex"></span>
  </div>
  <div class="swatch s3" id="s3">
    <span class="swatch-name" id="s3-name"></span>
    <span class="swatch-hex"  id="s3-hex"></span>
  </div>
  <div class="swatch s4" id="s4">
    <span class="warning-tag">⚠ acento apenas</span>
    <span class="warning-text">Vermelho em excesso passa agressividade. Use só em botões, highlights e detalhes pontuais.</span>
    <span class="swatch-name" id="s4-name"></span>
    <span class="swatch-hex"  id="s4-hex"></span>
  </div>
</div>

<div class="nav" id="nav">
  <div class="nav-left">
    <span class="nav-step-label" id="nav-step">Opção 1 de 3</span>
    <span class="nav-direction" id="nav-label"></span>
  </div>

  <div class="slider-wrap">
    <div class="slider-track">
      <div class="slider-bg" id="slider-bg"></div>
      <input type="range" min="0" max="9" value="2" step="1" class="slider-input" id="base-slider" oninput="onSlider(this.value)">
    </div>
    <div class="slider-labels">
      <span class="slider-label">Carvão quente</span>
      <span class="slider-label">Carvão frio</span>
    </div>
  </div>

  <div class="nav-buttons">
    <button class="nav-btn active" id="btn-a" onclick="goTo('a')">A</button>
    <button class="nav-btn"        id="btn-b" onclick="goTo('b')">B</button>
    <button class="nav-btn"        id="btn-c" onclick="goTo('c')">C</button>
  </div>
</div>

<script>
var baseColors = [
  { bg: '#1A1714', light: '#28241F', label: 'Carvão quente' },
  { bg: '#1B1A1C', light: '#2A2930', label: 'Carvão neutro' },
  { bg: '#1C1B21', light: '#2B2A31', label: 'Carvão frio' },
  { bg: '#1D1C24', light: '#2C2B35', label: 'Carvão azulado' },
  { bg: '#1E1D26', light: '#2D2C38', label: 'Carvão frio +' },
  { bg: '#1F1E28', light: '#2E2D3A', label: 'Quase azul' },
  { bg: '#1F1F2B', light: '#2F2E3D', label: 'Quase azul +' },
  { bg: '#1E2030', light: '#2D3040', label: 'Azul escuro' },
  { bg: '#1B2035', light: '#2A3045', label: 'Azul noite' },
  { bg: '#151E2E', light: '#2E3F5C', label: 'Midnight' }
];

var acents = {
  a: { bg: '#8B3A2A', name: 'Terracota', hex: '#8B3A2A · 10%' },
  b: { bg: '#7A3728', name: 'Cobre',     hex: '#7A3728 · 10%' },
  c: { bg: '#6B3030', name: 'Vinho',     hex: '#6B3030 · 10%' }
};

var currentId = 'a';
var currentSlider = 2;

function hexToRgb(h) {
  var r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
  return [r,g,b];
}

function updateSliderBg() {
  var stops = baseColors.map(function(c,i) {
    return c.bg + ' ' + (i/(baseColors.length-1)*100).toFixed(0) + '%';
  }).join(', ');
  document.getElementById('slider-bg').style.background = 'linear-gradient(to right, ' + stops + ')';
}

function render() {
  var base = baseColors[currentSlider];
  var acc  = acents[currentId];

  document.getElementById('nav').style.background = base.bg;

  var s1 = document.getElementById('s1');
  s1.style.background = base.bg;
  document.getElementById('s1-name').textContent = base.label;
  document.getElementById('s1-name').style.color = '#FAF9F6';
  document.getElementById('s1-hex').textContent  = base.bg + ' · 70%';
  document.getElementById('s1-hex').style.color  = '#FAF9F6';

  var s2 = document.getElementById('s2');
  s2.style.background = base.light;
  document.getElementById('s2-name').textContent = base.label + ' claro';
  document.getElementById('s2-name').style.color = '#FAF9F6';
  document.getElementById('s2-hex').textContent  = base.light + ' · 20%';
  document.getElementById('s2-hex').style.color  = '#FAF9F6';

  var s3 = document.getElementById('s3');
  s3.style.background = '#EDE8DF';
  document.getElementById('s3-name').textContent = 'Cream';
  document.getElementById('s3-name').style.color = '#1A1714';
  document.getElementById('s3-hex').textContent  = '#EDE8DF · 10%';
  document.getElementById('s3-hex').style.color  = '#1A1714';

  var s4 = document.getElementById('s4');
  s4.style.background = acc.bg;
  document.getElementById('s4-name').textContent = acc.name;
  document.getElementById('s4-name').style.color = '#FAF9F6';
  document.getElementById('s4-hex').textContent  = acc.hex;
  document.getElementById('s4-hex').style.color  = '#FAF9F6';
}

function onSlider(val) {
  currentSlider = parseInt(val);
  render();
}

function goTo(id) {
  currentId = id;
  var steps = { a: 'Opção 1 de 3', b: 'Opção 2 de 3', c: 'Opção 3 de 3' };
  var labels = { a: 'Terracota + Carvão', b: 'Cobre + Carvão', c: 'Vinho + Carvão' };
  document.getElementById('nav-step').textContent  = steps[id];
  document.getElementById('nav-label').textContent = labels[id];
  ['a','b','c'].forEach(function(k) {
    document.getElementById('btn-' + k).classList.toggle('active', k === id);
  });
  render();
}

updateSliderBg();
goTo('a');
</script>
</body>
</html>
